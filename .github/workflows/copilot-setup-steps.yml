name: Copilot Setup Steps

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  setup-environment:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: copilottest
          POSTGRES_PASSWORD: copilottest
          POSTGRES_DB: copilottestdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U copilottest -d copilottestdb"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Verify PostgreSQL connection
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          PGPASSWORD=copilottest psql -h localhost -U copilottest -d copilottestdb -c "SELECT version();"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=copilottestdb;Username=copilottest;Password=copilottest"

      - name: Database information
        run: |
          echo "PostgreSQL database is available for Copilot agents"
          echo "Connection string: Host=localhost;Port=5432;Database=copilottestdb;Username=copilottest;Password=copilottest"
