name: Copilot Setup Steps

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Start PostgreSQL with docker-compose
        run: |
          docker compose up -d postgres
          docker compose ps

      - name: Wait for PostgreSQL to be ready
        run: |
          timeout 60 bash -c 'until docker compose exec -T postgres pg_isready -U copilottest -d copilottestdb; do sleep 2; done'

      - name: Verify database initialization
        run: |
          docker compose exec -T postgres psql -U copilottest -d copilottestdb -c "SELECT * FROM health;"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests
        run: dotnet test --no-build --configuration Release --verbosity normal
        env:
          ConnectionStrings__DefaultConnection: "Host=localhost;Port=5432;Database=copilottestdb;Username=copilottest;Password=copilottest"

      - name: Database information
        run: |
          echo "PostgreSQL database is available for Copilot agents"
          echo "Connection string (without password): Host=localhost;Port=5432;Database=copilottestdb;Username=copilottest"

      - name: Cleanup
        if: always()
        run: docker compose down -v
